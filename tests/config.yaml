# zendure-bridge configuration
# Copy to config.yaml and fill in your values.
# config.yaml is in .gitignore – never commit credentials!

mqtt:
  # The Mosquitto broker on your Raspberry Pi
  broker: "broker.pi"
  port: 1883
  username: "mqtt"
  password: "password"
  client_id: "zendure-bridge"

  # Home Assistant MQTT broker (can be the same as above)
  ha_broker: "homeassistant.broker.ip"
  ha_port: 1883
  ha_username: "ha_mqtt"
  ha_password: "ha-mqtt-password"

zendure:
  # From the MQTT topics: /ABCDEF/12345678/...
  app_key: "ABCDEF"
  device_id: "12345678"

  # Interval between polling all properties (e.g. SoC, voltage, etc.) from the device
  # 0 disables the automatic polling after the initial query.
  # get_all_properties_interval: 60 # seconds

  # Battery packs (SNs from packData)
  packs:
    - sn: "123456789012345"
    - sn: "ABCDEFGHIJKLMNO"

homeassistant:
  # MQTT Discovery prefix (default in HA)
  discovery_prefix: "homeassistant_python_tests"
  # Device name as it appears in HA
  device_name: "Zendure SolarFlow"
  model_name:  "Hub 1200"

logging:
  # DEBUG, INFO, WARNING, ERROR
  level: "DEBUG"
  # Optional: log to file instead of stdout
  # file: "/var/log/zendure-bridge.log"
